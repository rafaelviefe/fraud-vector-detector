version: '3.8'

services:
  haproxy:
    image: haproxy:2.8-alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - shared-sockets:/tmp
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: '50M'
    depends_on:
      - api1
      - api2

  api1:
    build: .
    volumes:
      - shared-sockets:/tmp
    environment:
      - SOCKET_PATH=/tmp/api1.sock
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: '150M'

  api2:
    build: .
    volumes:
      - shared-sockets:/tmp
    environment:
      - SOCKET_PATH=/tmp/api2.sock
    deploy:
      resources:
        limits:
          cpus: '0.45'
          memory: '150M'

volumes:
  shared-sockets: